<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Green Classroom Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Corrected Icon component for Lucide browser usage
        const Icon = ({ name, className, size = 24 }) => {
            const ref = useRef(null);
            
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({
                        attrs: {
                            class: className,
                            width: size,
                            height: size
                        }
                    });
                }
            }, [name, className, size]);

            return <span ref={ref} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const stats = [
                { label: 'Paper Reduction', value: '95%', icon: 'trending-down' },
                { label: 'Tree Conservation', value: 'Thousands', icon: 'leaf' },
                { label: 'Exam Efficiency', value: '100%', icon: 'monitor' },
                { label: 'Student Engagement', value: 'High', icon: 'users' },
            ];

            const valueProps = [
                {
                    title: 'Eco-Friendly Environment',
                    desc: 'Transforming physical classrooms into sustainable digital ecosystems.',
                    icon: 'leaf'
                },
                {
                    title: 'Paper-Smart Exams',
                    desc: 'Secure, digital-first testing that eliminates the need for physical printing.',
                    icon: 'monitor'
                },
                {
                    title: 'Sustainable Future',
                    desc: 'Empowering the next generation with the tools to protect our planet.',
                    icon: 'globe'
                }
            ];

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/90 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-emerald-600 p-2 rounded-lg flex items-center justify-center">
                                    <Icon name="leaf" className="text-white" size={20} />
                                </div>
                                <span className="font-bold text-xl tracking-tight text-emerald-900">The Green Classroom</span>
                            </div>
                            <div className="hidden md:flex gap-8 text-sm font-medium text-slate-600">
                                <a href="#problem" className="hover:text-emerald-600 transition-colors">The Challenge</a>
                                <a href="#solution" className="hover:text-emerald-600 transition-colors">Our Solution</a>
                                <a href="#model" className="hover:text-emerald-600 transition-colors">Business Model</a>
                                <a href="#contact" className="px-4 py-2 bg-emerald-600 text-white rounded-full hover:bg-emerald-700 transition-colors">Partner With Us</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="relative pt-32 pb-20 overflow-hidden">
                        <div className="absolute top-0 right-0 -z-10 opacity-10">
                            <svg width="800" height="800" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                                <path fill="#10B981" d="M44.7,-76.4C58.8,-69.2,71.8,-59.1,79.6,-45.8C87.4,-32.5,90.1,-16.3,88.5,-0.9C86.9,14.4,81.1,28.8,72.4,41.4C63.7,54,52.1,64.8,38.6,71.4C25,78,9.5,80.4,-5.2,79.4C-19.9,78.4,-33.7,73.9,-45.9,66.4C58.1,58.9,-68.7,48.3,-75.6,35.6C-82.5,22.8,-85.7,7.8,-83.4,-6.5C-81.1,-20.7,-73.3,-34.2,-63.1,-45.2C-52.9,-56.2,-40.3,-64.7,-27.1,-72.6C-13.9,-80.5,0,-87.8,14.6,-85.3C29.2,-82.8,44.7,-76.4,44.7,-76.4Z" transform="translate(100 100)" />
                            </svg>
                        </div>
                        
                        <div className="max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-12 items-center">
                            <div className="space-y-8">
                                <div className="inline-flex items-center gap-2 px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold uppercase tracking-wider">
                                    <Icon name="check-circle-2" className="w-4 h-4" size={16} /> Camille’s Academy Diamond-Guyana
                                </div>
                                <h1 className="text-5xl lg:text-7xl font-extrabold text-slate-900 leading-[1.1]">
                                    Taking exams has <span className="text-emerald-600">never been greener.</span>
                                </h1>
                                <p className="text-xl text-slate-600 leading-relaxed max-w-xl">
                                    We are committed to transforming education through innovative digital models. By reducing reliance on paper, we inspire environmental responsibility in the next generation.
                                </p>
                                <div className="flex flex-wrap gap-4">
                                    <a href="#contact" className="px-8 py-4 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 hover:-translate-y-1 transition-all flex items-center gap-2">
                                        Join the Movement <Icon name="arrow-right" size={20} />
                                    </a>
                                    <a href="#problem" className="px-8 py-4 bg-white border-2 border-slate-200 text-slate-700 rounded-xl font-bold hover:border-emerald-600 hover:text-emerald-600 transition-all text-center">
                                        View Mission
                                    </a>
                                </div>
                            </div>
                            
                            <div className="relative">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-2xl relative z-10 border border-slate-100">
                                    <div className="aspect-video bg-emerald-50 rounded-[1.5rem] flex items-center justify-center overflow-hidden group">
                                        <div className="text-center p-8">
                                            <Icon name="monitor" className="text-emerald-600 mx-auto mb-4 group-hover:scale-110 transition-transform" size={64} />
                                            <h3 className="text-2xl font-bold text-slate-800">Digital Classroom Model</h3>
                                            <p className="text-slate-500 mt-2 italic">"Learn Green. Think Green. Test Green. Live Green."</p>
                                        </div>
                                    </div>
                                    <div className="mt-8 grid grid-cols-3 gap-4 text-center">
                                        {valueProps.map((prop, idx) => (
                                            <div key={idx} className="p-2">
                                                <div className="bg-emerald-50 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                                                    <Icon name={prop.icon} className="text-emerald-500" size={24} />
                                                </div>
                                                <p className="text-[10px] font-bold uppercase text-slate-400 tracking-tighter leading-none">{prop.title}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="absolute -bottom-6 -left-6 bg-emerald-600 text-white p-6 rounded-2xl shadow-xl z-20">
                                    <p className="text-sm font-medium opacity-80">Founder</p>
                                    <h4 className="text-xl font-bold">Ismal Rodriguez</h4>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Stats Bar */}
                    <section className="bg-emerald-900 text-white py-12">
                        <div className="max-w-7xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-8">
                            {stats.map((stat, i) => (
                                <div key={i} className="text-center space-y-2 border-r border-emerald-800 last:border-0">
                                    <Icon name={stat.icon} className="mx-auto opacity-50 mb-2" size={24} />
                                    <div className="text-3xl font-bold">{stat.value}</div>
                                    <div className="text-emerald-400 text-xs font-bold uppercase tracking-widest">{stat.label}</div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Problem & Impact Section */}
                    <section id="problem" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="grid lg:grid-cols-2 gap-16 items-center">
                                <div className="space-y-6">
                                    <div className="inline-flex items-center gap-2 text-rose-600 font-bold uppercase text-sm tracking-widest">
                                        <Icon name="alert-triangle" size={16} /> The Problem
                                    </div>
                                    <h2 className="text-4xl font-bold text-slate-900 leading-tight">
                                        Deforestation is destroying our future.
                                    </h2>
                                    <p className="text-lg text-slate-600">
                                        Manufacturing paper through the destruction of our rainforests is directly linked to global warming, rising sea levels, and severe climate change.
                                    </p>
                                    <div className="p-6 bg-rose-50 rounded-2xl border-l-4 border-rose-500">
                                        <p className="italic text-rose-900">
                                            "A small change in every classroom can create a big change for our future."
                                        </p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-slate-50 p-6 rounded-3xl space-y-4">
                                        <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-sm">
                                            <Icon name="trending-down" className="text-rose-500" size={24} />
                                        </div>
                                        <h4 className="font-bold text-slate-900">Rising Sea Levels</h4>
                                        <p className="text-sm text-slate-500 leading-relaxed">Direct consequence of unchecked global warming and forest loss.</p>
                                    </div>
                                    <div className="bg-emerald-50 p-6 rounded-3xl space-y-4 mt-8">
                                        <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-sm">
                                            <Icon name="leaf" className="text-emerald-500" size={24} />
                                        </div>
                                        <h4 className="font-bold text-emerald-900">The Solution</h4>
                                        <p className="text-sm text-emerald-700/70 leading-relaxed">Creating green classrooms reduces paper usage globally.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Methods Section */}
                    <section id="solution" className="py-24 bg-slate-50">
                        <div className="max-w-7xl mx-auto px-4 text-center mb-16 space-y-4">
                            <h2 className="text-4xl font-bold text-slate-900 tracking-tight">Our Methods</h2>
                            <p className="text-slate-600 max-w-2xl mx-auto">Leveraging modern technology to create a seamless, paperless educational experience.</p>
                        </div>
                        <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-2 gap-8">
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 flex flex-col items-center text-center group hover:shadow-xl hover:shadow-emerald-100 transition-all">
                                <div className="w-20 h-20 bg-emerald-100 rounded-3xl flex items-center justify-center mb-8 group-hover:rotate-6 transition-transform">
                                    <Icon name="monitor" className="text-emerald-600" size={40} />
                                </div>
                                <h3 className="text-2xl font-bold text-slate-900 mb-4">Digital Examinations</h3>
                                <p className="text-slate-600 leading-relaxed">
                                    Exams are conducted using laptops in a secure, controlled environment, ensuring efficiency, accuracy, and a 100% paperless process.
                                </p>
                            </div>
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 flex flex-col items-center text-center group hover:shadow-xl hover:shadow-emerald-100 transition-all">
                                <div className="w-20 h-20 bg-emerald-100 rounded-3xl flex items-center justify-center mb-8 group-hover:-rotate-6 transition-transform">
                                    <Icon name="pen-tool" className="text-emerald-600" size={40} />
                                </div>
                                <h3 className="text-2xl font-bold text-slate-900 mb-4">Electronic Note Pads</h3>
                                <p className="text-slate-600 leading-relaxed">
                                    Students utilize digital pads that accept electronic pens, allowing them to write, edit, and save their work directly to cloud storage.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* Business Model Canvas Presentation */}
                    <section id="model" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="bg-emerald-900 rounded-[4rem] overflow-hidden shadow-2xl flex flex-col lg:flex-row">
                                <div className="lg:w-1/3 p-12 space-y-6">
                                    <h2 className="text-4xl font-bold text-white">Business Model</h2>
                                    <p className="text-emerald-100/70">A robust ecosystem designed for scalability and impact across urban and rural educational sectors.</p>
                                    
                                    <div className="space-y-4 pt-8">
                                        <div className="flex items-center gap-4 text-white">
                                            <div className="bg-emerald-800 p-2 rounded-lg flex items-center justify-center"><Icon name="school" size={20} /></div>
                                            <span className="font-medium">Ministry of Education</span>
                                        </div>
                                        <div className="flex items-center gap-4 text-white">
                                            <div className="bg-emerald-800 p-2 rounded-lg flex items-center justify-center"><Icon name="users" size={20} /></div>
                                            <span className="font-medium">University of Guyana</span>
                                        </div>
                                        <div className="flex items-center gap-4 text-white">
                                            <div className="bg-emerald-800 p-2 rounded-lg flex items-center justify-center"><Icon name="handshake" size={20} /></div>
                                            <span className="font-medium">Parents Associations</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="lg:w-2/3 bg-white p-12 grid md:grid-cols-2 gap-8">
                                    <div className="space-y-4 text-left">
                                        <h4 className="font-bold text-emerald-900 uppercase text-xs tracking-widest border-b pb-2">Value Proposition</h4>
                                        <ul className="space-y-3">
                                            <li className="flex gap-2 text-sm text-slate-600 font-medium items-start">
                                                <Icon name="check-circle-2" className="text-emerald-600 mt-0.5 shrink-0" size={16} /> Significant decrease in deforestation
                                            </li>
                                            <li className="flex gap-2 text-sm text-slate-600 font-medium items-start">
                                                <Icon name="check-circle-2" className="text-emerald-600 mt-0.5 shrink-0" size={16} /> Faster, easier marking for educators
                                            </li>
                                            <li className="flex gap-2 text-sm text-slate-600 font-medium items-start">
                                                <Icon name="check-circle-2" className="text-emerald-600 mt-0.5 shrink-0" size={16} /> Modern tech-skills for all students
                                            </li>
                                        </ul>
                                    </div>
                                    <div className="space-y-4 text-left">
                                        <h4 className="font-bold text-emerald-900 uppercase text-xs tracking-widest border-b pb-2">Revenue Streams</h4>
                                        <ul className="space-y-3">
                                            <li className="flex gap-2 text-sm text-slate-600 font-medium items-start">
                                                <Icon name="check-circle-2" className="text-emerald-600 mt-0.5 shrink-0" size={16} /> Partnership contributions
                                            </li>
                                            <li className="flex gap-2 text-sm text-slate-600 font-medium items-start">
                                                <Icon name="check-circle-2" className="text-emerald-600 mt-0.5 shrink-0" size={16} /> Government funding models
                                            </li>
                                            <li className="flex gap-2 text-sm text-slate-600 font-medium items-start">
                                                <Icon name="check-circle-2" className="text-emerald-600 mt-0.5 shrink-0" size={16} /> Grants and green donations
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* The Big Ask */}
                    <section id="contact" className="py-24 bg-slate-50 overflow-hidden relative">
                        <div className="max-w-4xl mx-auto px-4 text-center space-y-12 relative z-10">
                            <div className="space-y-4">
                                <h2 className="text-5xl font-extrabold text-slate-900">The Big Ask</h2>
                                <p className="text-xl text-slate-600 leading-relaxed">
                                    We are seeking strategic funding and partnerships from corporations, environmental organizations, and government agencies to support the implementation and expansion of the <span className="font-bold text-emerald-600">Green Classroom</span> initiative.
                                </p>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:-translate-y-1 transition-transform">
                                    <h4 className="font-bold text-lg mb-2">Corporations</h4>
                                    <p className="text-sm text-slate-500">Invest in sustainable education and strengthen your CSR impact.</p>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:-translate-y-1 transition-transform">
                                    <h4 className="font-bold text-lg mb-2">Env. Organizations</h4>
                                    <p className="text-sm text-slate-500">Expand your reach and amplify your mission through our platform.</p>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:-translate-y-1 transition-transform">
                                    <h4 className="font-bold text-lg mb-2">Gov. Agencies</h4>
                                    <p className="text-sm text-slate-500">Support sustainable development and build a better future for Guyana.</p>
                                </div>
                            </div>

                            <div className="bg-emerald-600 rounded-3xl p-8 md:p-12 text-white text-left space-y-8 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-32 -mt-32"></div>
                                <h3 className="text-3xl font-bold">Invest Today. Inspire Tomorrow.</h3>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="space-y-4">
                                        <p className="text-emerald-50">Contact us to receive a detailed partnership proposal and see the Green Classroom in action.</p>
                                        <div className="flex flex-col gap-3">
                                            <div className="flex items-center gap-3"><Icon name="mail" className="opacity-60" size={20} /> contact@greenclassroom-guyana.edu</div>
                                            <div className="flex items-center gap-3"><Icon name="smartphone" className="opacity-60" size={20} /> +592 (XXX) XXX-XXXX</div>
                                        </div>
                                    </div>
                                    <form className="space-y-3" onSubmit={e => e.preventDefault()}>
                                        <input type="text" placeholder="Organization Name" className="w-full px-4 py-3 rounded-xl bg-emerald-700/50 border border-emerald-500 placeholder:text-emerald-300 text-white focus:outline-none focus:ring-2 focus:ring-white/50" />
                                        <button className="w-full bg-white text-emerald-600 font-bold py-3 rounded-xl hover:bg-emerald-50 transition-colors">Request Partnership Pack</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-white py-12 border-t border-slate-100">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8 text-center md:text-left">
                            <div className="flex items-center gap-2">
                                <div className="bg-emerald-600 p-2 rounded-lg flex items-center justify-center">
                                    <Icon name="leaf" className="text-white" size={20} />
                                </div>
                                <span className="font-bold text-xl tracking-tight text-emerald-900">The Green Classroom</span>
                            </div>
                            <p className="text-slate-400 text-sm italic">"Educate. Innovate. Sustain. Together, we can protect our planet."</p>
                            <div className="flex gap-6">
                                <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:bg-emerald-50 hover:text-emerald-600 transition-colors cursor-pointer">
                                    <Icon name="globe" size={20} />
                                </div>
                                <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:bg-emerald-50 hover:text-emerald-600 transition-colors cursor-pointer">
                                    <Icon name="bar-chart-3" size={20} />
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto px-4 pt-8 mt-8 border-t border-slate-50 text-center">
                            <p className="text-xs font-medium text-slate-400">© 2024 Ismal Rodriguez. Camille’s Academy Diamond-Guyana. All Rights Reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
