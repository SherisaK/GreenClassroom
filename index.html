<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Green Classroom Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .icon-container svg { display: block; margin: auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- This script MUST have type="text/babel" -->
    <script type="text/babel">
        // NO IMPORT STATEMENTS HERE. Use global variables.
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "", size = 24 }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    // Convert check-circle-2 to checkCircle2 (camelCase)
                    const camelName = name.replace(/-([a-z0-9])/g, (g) => g[1].toUpperCase());
                    const iconData = lucide.icons[camelName] || lucide.icons[name];
                    
                    if (iconData) {
                        ref.current.innerHTML = iconData.toSvg({
                            class: className,
                            width: size,
                            height: size,
                            'stroke-width': 2
                        });
                    }
                }
            }, [name, className, size]);
            return <span ref={ref} className="icon-container inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-emerald-600 p-2 rounded-lg flex items-center justify-center shadow-lg">
                                    <Icon name="leaf" className="text-white" size={20} />
                                </div>
                                <span className="font-bold text-xl tracking-tight text-emerald-900">The Green Classroom</span>
                            </div>
                            <div className="hidden md:flex gap-8 text-sm font-medium text-slate-600">
                                <a href="#problem" className="hover:text-emerald-600">Challenge</a>
                                <a href="#solution" className="hover:text-emerald-600">Solution</a>
                                <a href="#model" className="hover:text-emerald-600">Model</a>
                                <a href="#contact" className="px-4 py-2 bg-emerald-600 text-white rounded-full hover:bg-emerald-700 shadow-md">Partner With Us</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="relative pt-32 pb-20 overflow-hidden bg-white">
                        <div className="max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-12 items-center">
                            <div className="space-y-8">
                                <div className="inline-flex items-center gap-2 px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold uppercase tracking-wider">
                                    <Icon name="check-circle-2" className="w-4 h-4" size={16} /> Camille’s Academy Diamond-Guyana
                                </div>
                                <h1 className="text-5xl lg:text-7xl font-extrabold text-slate-900 leading-tight">
                                    Taking exams has <span className="text-emerald-600">never been greener.</span>
                                </h1>
                                <p className="text-xl text-slate-600 leading-relaxed max-w-xl">
                                    Transforming education through innovative digital models. Reducing reliance on paper to protect our rainforests.
                                </p>
                                <div className="flex gap-4">
                                    <a href="#contact" className="px-8 py-4 bg-emerald-600 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-700 flex items-center gap-2">
                                        Join Movement <Icon name="arrow-right" size={20} />
                                    </a>
                                </div>
                            </div>
                            <div className="relative">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-2xl border border-slate-100">
                                    <div className="aspect-video bg-emerald-50 rounded-[1.5rem] flex items-center justify-center">
                                        <div className="text-center">
                                            <Icon name="monitor" className="text-emerald-600 mx-auto mb-4" size={64} />
                                            <h3 className="text-2xl font-bold text-slate-800 italic">"Learn Green. Test Green."</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Problem */}
                    <section id="problem" className="py-24 bg-slate-50">
                        <div className="max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-16 items-center">
                            <div className="space-y-6">
                                <div className="inline-flex items-center gap-2 text-rose-600 font-bold uppercase text-sm tracking-widest">
                                    <Icon name="alert-triangle" size={16} /> The Crisis
                                </div>
                                <h2 className="text-4xl font-bold text-slate-900">Deforestation is destroying our future.</h2>
                                <p className="text-lg text-slate-600">Rainforest destruction for paper is linked to global warming and rising sea levels.</p>
                                <div className="p-6 bg-rose-50 border-l-4 border-rose-500 rounded-r-xl">
                                    <p className="text-rose-900 font-medium italic">"Small classroom changes create big future impacts."</p>
                                </div>
                            </div>
                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                <div className="flex items-center gap-4 mb-6">
                                    <div className="bg-rose-100 p-3 rounded-xl"><Icon name="trending-down" className="text-rose-600" /></div>
                                    <h4 className="font-bold text-xl">Rising Sea Levels</h4>
                                </div>
                                <p className="text-slate-500">A direct consequence of unchecked global warming and forest loss, threatening our coastal communities.</p>
                            </div>
                        </div>
                    </section>

                    {/* Methods */}
                    <section id="solution" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 text-center mb-16">
                            <h2 className="text-4xl font-bold mb-4">Our Sustainable Methods</h2>
                            <p className="text-slate-500">Leveraging technology for a seamless, paperless experience.</p>
                        </div>
                        <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-2 gap-8">
                            <div className="bg-emerald-50 p-10 rounded-[2.5rem] text-center border border-emerald-100">
                                <Icon name="monitor" className="text-emerald-600 mb-6" size={48} />
                                <h3 className="text-2xl font-bold mb-4">Digital Examinations</h3>
                                <p className="text-slate-600">Secure, controlled environments using laptops to eliminate paper waste entirely.</p>
                            </div>
                            <div className="bg-emerald-50 p-10 rounded-[2.5rem] text-center border border-emerald-100">
                                <Icon name="pen-tool" className="text-emerald-600 mb-6" size={48} />
                                <h3 className="text-2xl font-bold mb-4">Electronic Note Pads</h3>
                                <p className="text-slate-600">Students write, edit, and save work directly to cloud storage using electronic pens.</p>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-emerald-900 text-white py-12">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-2">
                                <Icon name="leaf" className="text-emerald-400" />
                                <span className="font-bold text-xl tracking-tight">The Green Classroom</span>
                            </div>
                            <p className="text-emerald-200/60 text-sm">© 2024 Ismal Rodriguez. Camille’s Academy Diamond-Guyana.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
